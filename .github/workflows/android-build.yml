name: Android Build
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: Gradle variant to build
        default: Debug
        type: choice
        options: [Debug, Release]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VARIANT: ${{ inputs.variant || 'Debug' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      - name: Prebuild (generate android/)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Gradle build
        working-directory: android
        run: ./gradlew assemble${{ env.VARIANT }} --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: notifylocale-${{ env.VARIANT }}-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
