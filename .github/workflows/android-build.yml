name: Android Build
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: Gradle variant to build
        default: Debug
        type: choice
        options: [Debug, Release]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VARIANT: ${{ inputs.variant || 'Debug' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      - name: Prebuild (generate android/)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Gradle build
        working-directory: android
        run: ./gradlew assemble${{ env.VARIANT }} --no-daemon

      - name: Stage APK
        id: stage
        run: |
          mkdir -p dist
          SHA_SHORT=$(git rev-parse --short HEAD)
          OUT="dist/notifylocale-${{ env.VARIANT }}-build${{ github.run_number }}-${SHA_SHORT}.apk"
          cp $(find android/app/build/outputs/apk -name '*.apk' | head -1) "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: notifylocale-${{ env.VARIANT }}-apk
          path: ${{ steps.stage.outputs.apk }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} (${{ env.VARIANT }})
          body: |
            Automated build from `${{ github.sha }}`.
            - Variant: **${{ env.VARIANT }}**
            - Commit: ${{ github.event.head_commit.message || 'manual dispatch' }}

            Install on Android: download the `.apk` below and open it on the device (allow "install from unknown sources" if prompted).
          files: ${{ steps.stage.outputs.apk }}
          prerelease: true
          fail_on_unmatched_files: true
